name: Sync Wine Index

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
      - run: npm ci
      - run: node scripts/sync-wine-index.mjs
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          SCRAPE_PROXY_URL: http://100.67.183.14:8889
          SCRAPE_PROXY_SECRET: ${{ secrets.SCRAPE_PROXY_SECRET }}
